<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lock Screen Preview</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    background: radial-gradient(circle at top, #1b2436 0%, #0a0e17 65%);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .lock-wrap{
    max-width:380px; width:100%; text-align:center;
    padding:40px 32px 32px 32px; border-radius:20px;
    background: linear-gradient(145deg, #131a29, #0d1220);
    border:1px solid #253045;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.08), 0 20px 60px rgba(0,0,0,0.5);
  }
  .lock-icon{
    width:64px; height:64px; margin:0 auto 18px auto; border-radius:50%;
    background: linear-gradient(145deg, #1e2c4a, #0f1626);
    display:flex; align-items:center; justify-content:center; font-size:28px;
    box-shadow: 0 0 24px rgba(59,130,246,0.35), inset 0 0 12px rgba(255,255,255,0.03);
  }
  .lock-title{font-size:22px; font-weight:700; color:#e6edf3; margin-bottom:4px; letter-spacing:.02em;}
  .lock-sub{font-size:13px; color:#6f7d94; margin-bottom:26px;}
  .pin-input{
    width:100%; text-align:center; font-size:26px; letter-spacing:14px; font-weight:700;
    background:#0a0e17; border:1px solid #2a3550; color:#7fd4ff;
    border-radius:10px; padding:12px; outline:none;
  }
  .pin-input:focus{border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.25);}
  .unlock-btn{
    width:100%; margin-top:14px; background:linear-gradient(145deg,#3b82f6,#2563eb);
    color:#fff; font-weight:700; border:none; padding:12px; border-radius:10px;
    box-shadow:0 6px 18px rgba(37,99,235,0.35); cursor:pointer; font-size:14px;
  }
  .dots{display:flex; gap:8px; justify-content:center; margin-top:16px;}
  .dot{width:8px; height:8px; border-radius:50%; background:#253045;}
  .dot.filled{background:#3b82f6; box-shadow:0 0 8px #3b82f6;}
</style>
</head>
<body>
  <div class="lock-wrap">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">Welcome Ahsan</div>
    <div class="lock-sub">Enter your PIN to access the dashboard</div>
    <input class="pin-input" type="password" maxlength="4" placeholder="••••" value="1458">
    <div class="dots">
      <div class="dot filled"></div><div class="dot filled"></div>
      <div class="dot filled"></div><div class="dot filled"></div>
    </div>
    <button class="unlock-btn">Unlock</button>
  </div>
</body>
</html>
